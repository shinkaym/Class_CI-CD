name: Node.js CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Deploy source to app directory
        run: |
          cd /var/www/Class_CI-CD
          git fetch origin main
          git checkout main
          git pull origin main
          npm ci
          cat > .env << 'EOF'
          ${{ secrets.PROD_ENV }}
          EOF
          pm2 restart class_cicd --update-env
          pm2 save
