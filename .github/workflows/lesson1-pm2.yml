  name: Lesson 1 - CI/CD with PM2

  on:
    push:
      branches: ["main"]

  jobs:
    deploy:
      runs-on: self-hosted

      steps:
        - name: Checkout source
          uses: actions/checkout@v4

        - name: Use Node.js 20
          uses: actions/setup-node@v4
          with:
            node-version: "20"
            cache: "npm"

        - name: Install dependencies
          run: npm ci

        - name: Create .env from secret
          run: |
            cat > .env << 'EOF'
            ${{ secrets.PROD_ENV }}
            EOF

        - name: Restart PM2 app
          run: |
            pm2 restart class_cicd || pm2 start server.js --name class_cicd
            pm2 save

        - name: Health check
          run: curl -f http://127.0.0.1:5000/ci-cd